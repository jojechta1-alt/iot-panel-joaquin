<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo IoT - Chart.js & Vercel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        canvas { max-height: 400px; }
        .info { margin-bottom: 20px; color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Visualización de Temperaturas IoT</h1>
        <p class="info">Datos consumidos desde AWS Lambda (Ohio) y DynamoDB</p>
        
        <canvas id="myChart"></canvas>
        
        <div style="margin-top: 20px;">
            <button onclick="cargarGrafico()">Actualizar Datos</button>
        </div>
    </div>

    <script>
        // Reemplaza con tu URL de Lambda GET
        const API_URL = "https://cyg6365d27odhnityhe33h5ks40uogmz.lambda-url.us-east-2.on.aws/";
        let miGrafico;

        async function cargarGrafico() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const lecturas = data.lecturas;

                // Ordenar por fecha para que el gráfico sea coherente
                lecturas.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

                // Extraer etiquetas (tiempo) y valores (temperatura)
                const etiquetas = lecturas.map(l => new Date(l.timestamp).toLocaleTimeString());
                const temperaturas = lecturas.map(l => parseFloat(l.temperature));

                renderizarChart(etiquetas, temperaturas);
            } catch (error) {
                console.error("Error cargando datos:", error);
                alert("No se pudo conectar con la API de AWS");
            }
        }

        function renderizarChart(labels, data) {
            const ctx = document.getElementById('myChart').getContext('2d');
            
            // Si el gráfico ya existe, lo destruimos para crearlo de nuevo con datos frescos
            if (miGrafico) { miGrafico.destroy(); }

            miGrafico = new Chart(ctx, {
                type: 'line', // Tipo de gráfico: línea
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Temperatura (°C)',
                        data: data,
                        borderColor: '#4299e1',
                        backgroundColor: 'rgba(66, 153, 225, 0.2)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3 // Suaviza la curva
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: false }
                    }
                }
            });
        }

        // Carga inicial
        window.onload = cargarGrafico;
    </script>
</body>
</html>
